<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">Design System: Ubani</title>
  <desc id="desc">A structured design system cover showing semantic tokens, components, and product flows.</desc>
  <rect width="1600" height="1000" fill="#f5f1e8"/>
  <rect x="64" y="64" width="1472" height="872" fill="#ffffff" stroke="#202020" stroke-width="2"/>
  <g fill="#202020">
