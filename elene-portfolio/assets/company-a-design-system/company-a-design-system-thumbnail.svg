<svg width="1400" height="1050" viewBox="0 0 1400 1050" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1400" y2="1050" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#c9d8de"/>
      <stop offset="0.38" stop-color="#5f91bd"/>
      <stop offset="0.72" stop-color="#1468ab"/>
      <stop offset="1" stop-color="#07559b"/>
    </linearGradient>
    <filter id="grain" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.16"/>
      </feComponentTransfer>
    </filter>
    <radialGradient id="warm" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(100 80) rotate(42) scale(880 720)">
      <stop offset="0" stop-color="#c9a49a" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#c9a49a" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1400" height="1050" fill="url(#bg)"/>
  <rect width="1400" height="1050" fill="url(#warm)"/>
  <rect width="1400" height="1050" filter="url(#grain)" opacity="0.72"/>
  <g fill="#fff" font-family="Inter, Arial, Helvetica, sans-serif" text-anchor="middle">
    <text x="700" y="310" font-size="94" font-weight="700" letter-spacing="-1">
      <tspan x="700" dy="0">From A/B Tests to a</tspan>
      <tspan x="700" dy="112">Scalable Design System:</tspan>
    </text>
    <text x="700" y="610" font-size="58" font-weight="700">
      <tspan x="700" dy="0">How a &#177;200% Conversion Lift</tspan>
      <tspan x="700" dy="78">Exposed the Need for Better</tspan>
      <tspan x="700" dy="78">UX Infrastructure</tspan>
    </text>
  </g>
</svg>
